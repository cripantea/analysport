services:

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "8080:8080"   # app
      - "9901:9901"   # admin panel
    volumes:
      - ./deploy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ALLOW_ORIGINS=http://localhost:8080
    volumes:
      - ./data:/app/data          # SQLite + raw/analyzed
    expose:
      - "8002"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""          # chiamate relative → Envoy le instrada al backend
    expose:
      - "80"
    restart: unless-stopped
