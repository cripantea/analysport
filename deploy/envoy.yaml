static_resources:

  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          stream_idle_timeout: 0s          # necessario per SSE
          request_timeout: 0s
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          route_config:
            name: local_route
            virtual_hosts:
            - name: app
              domains: ["*"]
              routes:
              # -- API backend --
              - match:
                  prefix: "/analyses"
                route:
                  cluster: backend
                  timeout: 30s
              - match:
                  prefix: "/analyze"
                route:
                  cluster: backend
                  timeout: 0s              # streaming SSE senza timeout
              - match:
                  prefix: "/articles"
                route:
                  cluster: backend
                  timeout: 30s
              # -- Frontend statico --
              - match:
                  prefix: "/"
                route:
                  cluster: frontend
                  timeout: 10s
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: backend
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: backend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: backend          # nome servizio Docker Compose
                port_value: 8002

  - name: frontend
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: frontend
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: frontend         # nome servizio Docker Compose
                port_value: 80

# Pannello admin Envoy: http://localhost:9901
admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
